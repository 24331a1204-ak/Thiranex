<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📋 My Tasks</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <main class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <input
                    type="text"
                    id="taskInput"
                    class="task-input"
                    placeholder="Add a new task..."
                    autocomplete="off"
                />
                <button id="addBtn" class="add-btn">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">Add Task</span>
                </button>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">
                    All <span class="filter-count">0</span>
                </button>
                <button class="filter-btn" data-filter="active">
                    Active <span class="filter-count">0</span>
                </button>
                <button class="filter-btn" data-filter="completed">
                    Completed <span class="filter-count">0</span>
                </button>
            </div>

            <!-- Task List -->
            <div class="task-list-container">
                <ul class="task-list" id="taskList">
                    <!-- Tasks will be dynamically added here -->
                </ul>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🎯</div>
                    <h3>No tasks yet</h3>
                    <p>Add a task to get started!</p>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total Tasks:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Remaining:</span>
                    <span class="stat-value" id="remainingCount">0</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompleted" class="action-btn clear-btn">
                    Clear Completed
                </button>
                <button id="clearAll" class="action-btn delete-btn">
                    Clear All Tasks
                </button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
